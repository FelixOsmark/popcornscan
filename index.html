<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mama's Corner Scan</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#333333">
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #333333; color: white; display: flex; flex-direction: column; justify-content: center; height: 90vh; transition: background 0.3s; }
    h1 { font-size: 2.2rem; margin-bottom: 10px; }
    p { font-size: 1.2rem; line-height: 1.4; }
    .box { background: rgba(0,0,0,0.2); padding: 30px 20px; border-radius: 15px; display: inline-block; margin: 0 auto; max-width: 90%; width: 340px; box-sizing: border-box; }
    .loader { margin: 15px auto; border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid white; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="box">
    <h1 id="title">Mama's Corner</h1>
    <p id="message">Validerer kupon med databasen... ⏳</p>
    <div id="loader" class="loader"></div>
  </div>

  <script>
    // Registrer Service Worker for PWA (App-funktion)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Hent ID direkte fra URL'en
    const urlParams = new URLSearchParams(window.location.search);
    const couponId = urlParams.get('id');

    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const loader = document.getElementById('loader');

    const EDGE_FUNCTION_URL = "https://axfxaclkvdlbjqangori.supabase.co/functions/v1/scan";

    if (!couponId) {
      loader.style.display = "none";
      document.body.style.backgroundColor = "#ff4d4d";
      titleEl.innerText = "Fejl";
      messageEl.innerText = "Ingen kupon-ID fundet i linket.";
    } else {
      fetch(EDGE_FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: couponId })
      })
      .then(res => res.json())
      .then(data => {
        loader.style.display = "none";

        if (data.success && data.status === "APPROVED") {
          document.body.style.backgroundColor = "#2ec4b6"; 
          titleEl.innerText = "GODKENDT! 🍿";
          messageEl.innerText = `Giv 1 gratis popcorn.\n\nKunde: ${data.email || ''}`;
        } else if (data.status === "ALREADY_USED") {
          document.body.style.backgroundColor = "#ffa500"; 
          titleEl.innerText = "ALLEREDE BRUGT ❌";
          messageEl.innerText = `Denne kupon blev brugt tidligere.\n\nKunde: ${data.email || ''}`;
        } else {
          document.body.style.backgroundColor = "#ff4d4d"; 
          titleEl.innerText = "Fejl";
          messageEl.innerText = "Kuponen eksisterer ikke eller kunne ikke opdateres.";
        }
      })
      .catch(err => {
        loader.style.display = "none";
        document.body.style.backgroundColor = "#ff4d4d";
        titleEl.innerText = "Forbindelsesfejl";
        messageEl.innerText = "Kunne ikke oprette forbindelse til databasen.";
      });
    }
  </script>
</body>
</html>
