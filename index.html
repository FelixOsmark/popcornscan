<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mama's Corner Scanner</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#333333">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #333333; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; transition: background 0.3s; }
    h1 { font-size: 2.2rem; margin-bottom: 5px; }
    p { font-size: 1.2rem; margin-bottom: 20px; }
    .box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; max-width: 90%; width: 360px; box-sizing: border-box; }
    #reader { width: 100%; border-radius: 10px; overflow: hidden; background: black; }
    .status-box { display: none; padding: 20px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    button { font-size: 1.1rem; padding: 10px 20px; background: #2ec4b6; border: none; color: white; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%; }
    .loader { display: none; margin: 15px auto; border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid white; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="box" id="main-box">
    <h1>Mama's Corner</h1>
    <p id="info-text">Scan kundens QR-kode</p>
    
    <div id="reader"></div>
    
    <div id="loader" class="loader"></div>
    <button id="reset-btn" style="display: none;" onclick="resetScanner()">Scan Næste Kupon</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const EDGE_FUNCTION_URL = "https://axfxaclkvdlbjqangori.supabase.co/functions/v1/scan";
    let html5QrcodeScanner;

    // Start kameraet når siden lander
    window.addEventListener('DOMContentLoaded', () => {
      startScanner();
    });

    function startScanner() {
      html5QrcodeScanner = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };
      
      // Brug bagerste kamera ("environment")
      html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
      .catch(err => {
        document.getElementById('info-text').innerText = "Kunne ikke åbne kamera. Tjek tilladelser.";
      });
    }

    function onScanSuccess(decodedText) {
      // Stop kameraet midlertidigt så vi ikke scanner den samme kode 50 gange
      html5QrcodeScanner.stop().then(() => {
        validerKupon(decodedText.trim());
      });
    }

    function validerKupon(couponId) {
      document.getElementById('reader').style.display = 'none';
      document.getElementById('loader').style.display = 'block';
      document.getElementById('info-text').innerText = "Tjekker databasen... ⏳";

      fetch(EDGE_FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: couponId })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';

        if (data.success && data.status === "APPROVED") {
          document.body.style.backgroundColor = "#2ec4b6"; // Grøn
          document.getElementById('info-text').innerHTML = `<strong>GODKENDT! 🍿</strong><br><br>Giv 1 gratis popcorn.<br><br>Kunde: ${data.email || ''}`;
        } else if (data.status === "ALREADY_USED") {
          document.body.style.backgroundColor = "#ffa500"; // Orange
          document.getElementById('info-text').innerHTML = `<strong>ALLEREDE BRUGT ❌</strong><br><br>Blev brugt tidligere.<br><br>Kunde: ${data.email || ''}`;
        } else {
          document.body.style.backgroundColor = "#ff4d4d"; // Rød
          document.getElementById('info-text').innerHTML = "<strong>FEJL! 🤔</strong><br><br>Kuponen eksisterer ikke i systemet.";
        }
      })
      .catch(err => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';
        document.body.style.backgroundColor = "#ff4d4d";
        document.getElementById('info-text').innerText = "Forbindelsesfejl til databasen.";
      });
    }

    function resetScanner() {
      document.body.style.backgroundColor = "#333333";
      document.getElementById('info-text').innerText = "Scan kundens QR-kode";
      document.getElementById('reader').style.display = 'block';
      document.getElementById('reset-btn').style.display = 'none';
      startScanner();
    }
  </script>
</body>
</html>
